name: Build Toolchain

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Release name (defaults to the pushed tag)'
        required: false
        default: ''

# Cancel any superseded run on the same ref.
concurrency:
  group: build-toolchain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Start with Linux x86_64 only. Add more hosts here once this is green.
          - name: x86_64-linux
            runner: ubuntu-latest
            artifact_suffix: x86_64-linux
            ccache_key: ubuntu-x86_64

    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Install host build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git make cmake ninja-build gcc g++ python3 autoconf m4 pkg-config

      - name: Configure git for component clones
        # init-src.sh clones public LinxISA component repos; no extra auth needed.
        run: |
          git config --global --add safe.directory '*'

      - name: Initialize component sources
        run: make init-src

      - name: Prepare ccache
        # Speeds up the LLVM rebuild on re-runs of the same tag/ref.
        uses: hendrikmuhs/ccache-action@v1.2.14
        with:
          key: ${{ matrix.ccache_key }}
          max-size: '2G'

      - name: Build the toolchain
        # CCACHE is wrapped through PATH so the Makefile picks it up when
        # ENABLE_CCACHE=on (the Makefile gates on `which ccache`).
        env:
          ENABLE_CCACHE: 'on'
          THREADS: '4'
        run: |
          export PATH="/usr/lib/ccache:/usr/local/bin:$PATH"
          make WITH_TARGET=linx64v5-linux-musl

      - name: Package the toolchain
        run: make package

      - name: Rename package with host suffix
        # The Makefile writes output/linx_blockisa_llvm_musl.tar.gz. Give it a
        # host-qualified name so future multi-host releases do not collide.
        run: |
          mv output/linx_blockisa_llvm_musl.tar.gz \
             output/linx_blockisa_llvm_musl-${{ matrix.artifact_suffix }}.tar.gz
          ls -lh output/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: linx_toolchain_${{ matrix.artifact_suffix }}
          path: output/linx_blockisa_llvm_musl-${{ matrix.artifact_suffix }}.tar.gz
          retention-days: 14

      - name: Print build log tail on failure
        if: failure()
        run: |
          if [ -f build.log ]; then
            echo "===== build.log (last 300 lines) ====="
            tail -n 300 build.log
          fi

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    # Only publish a release when triggered by a tag push.
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2.2.0
        with:
          # Use the pushed tag as the release name unless overridden.
          name: ${{ inputs.release_name || github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
          body: |
            Linx LLVM + musl toolchain for `linx64v5-linux-musl`.

            Built from tag `${{ github.ref_name }}` on `${{ github.run_id }}`.

            ## Assets
            - `linx_blockisa_llvm_musl-x86_64-linux.tar.gz` — host: Linux x86_64

            ## Install
            ```sh
            tar xzf linx_blockisa_llvm_musl-x86_64-linux.tar.gz
            export PATH="$PWD/linx_blockisa_llvm_musl/bin:$PATH"
            ```
          files: |
            artifacts/linx_blockisa_llvm_musl-*.tar.gz
